# =============================================================================
# environments.ini
# -----------------------------------------------------------------------------
# Liste des environnements et bases utilisables par launch_SQL_query_V2.py.
#
# Convention : une section par couple <ENVIRONNEMENT>:<base>.
#   - <ENVIRONNEMENT> : nom logique (QUALIF, PROD, RECETTE, ...). Ce nom
#     apparait dans le menu interactif du script.
#   - <base>          : code court de la base (mdg, dwh, iehe, ...). Ce
#     code doit correspondre a la metadonnee "-- db: <base>" des fichiers
#     .sql.
#
# Champs requis selon le type de base :
#   Oracle (mdg, dwh) : host, port, sid
#   PostgreSQL (iehe) : host, port, dbname
#
# Pour ajouter un environnement, dupliquer un bloc existant et adapter les
# valeurs. Pour ajouter une base (ex. ods) il faut egalement la referencer
# dans les fichiers .sql via "-- db: <code>".
# =============================================================================

[QUALIF:mdg]
host = bdd-S4PSYY00.alias
port = 1521
sid  = S4PSYY00

[QUALIF:dwh]
host = bdd-X0PSYY02.alias
port = 1521
sid  = X0PSYY02

[QUALIF:iehe]
host    = bdd-X0ED0550.alias
port    = 5559
dbname  = choregie_db

[PROD:mdg]
host = bdd-X0PSYY00.alias
port = 1521
sid  = X0PSYY00

[PROD:dwh]
host = bdd-X0PSYY02.alias
port = 1521
sid  = X0PSYY02

[PROD:iehe]
host    = bdd-X0ED0550.alias
port    = 5559
dbname  = choregie_db
