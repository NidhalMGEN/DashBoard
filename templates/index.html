<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervision PSC — Pipeline CIAM v4.0</title>
  <style>
    :root {
      --mgen-green:    #6ab023;
      --mgen-green-dk: #4d8019;
      --mgen-green-lt: #f0f7e6;
      --bg:            #111118;
      --bg-card:       #1a1a24;
      --bg-sidebar:    #16161f;
      --bg-input:      #2a2a38;
      --border:        #2a2a38;
      --border-active: #3a3a50;
      --text:          #f0f0f0;
      --text-muted:    #a0a0b0;
      --text-dim:      #666680;
      --success:       #6ab023;
      --warning:       #f59e0b;
      --danger:        #ef4444;
      --info:          #60a5fa;
      --running:       #3b82f6;
      --skip:          #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Vue login ── */
    #view-login {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 36px 32px; width: 100%; max-width: 420px;
    }
    .login-header { text-align: center; margin-bottom: 28px; }
    .login-header img { height: 48px; margin-bottom: 12px; }
    .login-header h1 { font-size: 18px; color: var(--text); font-weight: 600; }
    .login-header p  { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .field-group { margin-bottom: 16px; }
    .field-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .field-wrap { position: relative; }
    .field-wrap input {
      width: 100%; padding: 10px 40px 10px 12px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 14px;
      outline: none; transition: border 0.2s;
    }
    .field-wrap input:focus { border-color: var(--mgen-green); }
    .field-wrap input.invalid { border-color: var(--danger); }
    .toggle-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: var(--text-dim); font-size: 16px; user-select: none;
    }
    .btn-primary {
      width: 100%; padding: 12px; background: var(--mgen-green);
      color: #fff; border: none; border-radius: 6px; font-size: 15px;
      font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--mgen-green-dk); }

    /* ── Vue pipeline ── */
    #view-pipeline { display: none; flex-direction: column; height: 100vh; }
    .topbar {
      display: flex; align-items: center; padding: 10px 20px;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .topbar img { height: 28px; }
    .topbar-title { font-size: 14px; font-weight: 600; flex: 1; }
    .flux-label { font-size: 12px; color: var(--text-muted); }
    #btn-quit {
      padding: 6px 14px; background: transparent;
      border: 1px solid var(--border-active); border-radius: 6px;
      color: var(--text-muted); font-size: 13px; cursor: pointer;
      display: none;
    }
    #btn-quit:hover { border-color: var(--danger); color: var(--danger); }
    .pipeline-body { display: flex; flex: 1; overflow: hidden; }

    /* Panel gauche */
    .sidebar {
      width: 220px; min-width: 220px; background: var(--bg-sidebar);
      border-right: 1px solid var(--border); padding: 16px 0;
      display: flex; flex-direction: column;
    }
    .sidebar-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 1px; padding: 0 16px 12px; }
    .step-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; cursor: default; transition: background 0.15s;
    }
    .step-item.active { background: #1e2030; border-left: 3px solid var(--mgen-green); padding-left: 13px; }
    .step-num {
      width: 22px; height: 22px; border-radius: 50%; background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--text-dim); flex-shrink: 0;
    }
    .step-label { font-size: 13px; flex: 1; }
    .step-badge { font-size: 14px; }
    .step-pending  .step-label { color: var(--text-dim); }
    .step-running  .step-label { color: var(--info); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .step-running  .step-badge { animation: pulse 1.2s infinite; }
    .step-ok       .step-label { color: var(--success); }
    .step-skip     .step-label { color: var(--skip); text-decoration: line-through; }
    .step-error    .step-label { color: var(--danger); }
    .progress-wrap { padding: 16px; margin-top: auto; }
    .progress-wrap label { font-size: 11px; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 6px; }
    progress {
      width: 100%; height: 6px; border-radius: 4px; appearance: none; border: none;
    }
    progress::-webkit-progress-bar   { background: var(--bg-input); border-radius: 4px; }
    progress::-webkit-progress-value { background: var(--mgen-green); border-radius: 4px; }
    progress::-moz-progress-bar      { background: var(--mgen-green); border-radius: 4px; }

    /* Panel droit — logs */
    .log-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .log-header { font-size: 11px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 1px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    #log-box {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      background: #0e0e16; font-family: Consolas, 'Courier New', monospace;
      font-size: 11px; line-height: 1.8;
    }
    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-ts   { color: #444460; }

    /* Pause banner */
    #pause-banner {
      display: none; align-items: center; gap: 10px;
      margin: 10px 16px; padding: 12px 16px;
      background: #1a2040; border: 1px solid #2a3a70; border-radius: 8px;
      font-size: 13px; color: var(--info);
    }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.6} }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--info); flex-shrink: 0;
      animation: pulse-dot 1.2s infinite;
    }

    /* Toolbar bas */
    .toolbar {
      display: flex; gap: 8px; padding: 10px 16px;
      border-top: 1px solid var(--border); background: var(--bg-card);
    }
    .btn-tool {
      padding: 7px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-muted); font-size: 13px; cursor: pointer;
    }
    .btn-tool:hover { border-color: var(--border-active); color: var(--text); }
    #btn-continue {
      display: none; padding: 7px 18px; background: var(--mgen-green);
      border: none; border-radius: 6px; color: #fff; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-left: auto;
      animation: pulse 1.5s infinite;
    }
    #btn-continue:hover { background: var(--mgen-green-dk); animation: none; }

    /* Section rapport */
    #report-section { display: none; padding: 24px; background: #fff; }
  </style>
</head>
<body>

<!-- ══════════════ VUE LOGIN ══════════════ -->
<div id="view-login">
  <div class="login-card">
    <div class="login-header">
      <img id="logo-login" alt="MGEN">
      <h1>Supervision PSC</h1>
      <p>Pipeline CIAM — v4.0</p>
    </div>
    <div class="field-group">
      <label>Utilisateur</label>
      <div class="field-wrap">
        <input type="text" id="pg-user" placeholder="Identifiant PostgreSQL" autocomplete="username">
      </div>
    </div>
    <div class="field-group">
      <label>Mot de passe</label>
      <div class="field-wrap">
        <input type="password" id="pg-pass" placeholder="••••••••" autocomplete="current-password">
        <span class="toggle-eye" id="toggle-eye" title="Afficher/masquer">👁</span>
      </div>
    </div>
    <button class="btn-primary" id="btn-launch">▶&nbsp; Lancer le pipeline</button>
  </div>
</div>

<!-- ══════════════ VUE PIPELINE ══════════════ -->
<div id="view-pipeline">
  <div class="topbar">
    <img id="logo-top" alt="MGEN">
    <span class="topbar-title">Supervision PSC</span>
    <span class="flux-label" id="flux-label">Flux : —</span>
    <button id="btn-quit" onclick="quit()">Quitter</button>
  </div>

  <div class="pipeline-body">
    <!-- Sidebar étapes -->
    <aside class="sidebar">
      <div class="sidebar-title">Étapes</div>
      <div id="steps-list"></div>
      <div class="progress-wrap">
        <label>
          <span>Progression</span>
          <span id="pct-label">0%</span>
        </label>
        <progress id="prog-bar" value="0" max="100"></progress>
      </div>
    </aside>

    <!-- Logs + pause + toolbar -->
    <div class="log-panel">
      <div class="log-header">Logs en temps réel</div>
      <div id="pause-banner">
        <span class="pulse-dot"></span>
        <span id="pause-message">Action requise…</span>
      </div>
      <div id="log-box"></div>
      <div class="toolbar">
        <button class="btn-tool" onclick="openFolder('Input_Data')">📁 Input_Data</button>
        <button class="btn-tool" onclick="openFolder('Output')">📁 Output</button>
        <button id="btn-continue" onclick="doContinue()">✅ Continuer ▶</button>
      </div>
    </div>
  </div>

  <!-- Rapport injecté ici -->
  <section id="report-section"></section>
</div>

  document.getElementById('logo-login').src = 'data:image/jpeg;base64,' + LOGO_B64;
  document.getElementById('logo-top').src   = 'data:image/jpeg;base64,' + LOGO_B64;

  // ── Définition des étapes ────────────────────────────────────────────
  const STEPS = [
    { id: 'tcd',    label: 'TCD Accolade',   num: '①' },
    { id: 'iehe',   label: 'IEHE + SQL',      num: '②' },
    { id: 'detail', label: 'Fichiers détail', num: '③' },
    { id: 'retry',  label: 'Retry IEHE KO',   num: '④' },
    { id: 'ged',    label: 'Contrôle GED',    num: '④b' },
    { id: 'kpi',    label: 'Calcul KPI',      num: '⑤' },
    { id: 'bdd',    label: 'Chargement BDD',  num: '⑥' },
  ];

  const BADGES = { pending:'—', running:'⏳', ok:'✓', skip:'—', error:'✗' };

  function buildStepsList() {
    const list = document.getElementById('steps-list');
    list.innerHTML = '';
    STEPS.forEach(s => {
      const el = document.createElement('div');
      el.className = 'step-item step-pending';
      el.id = 'step-' + s.id;
      el.innerHTML = `
        <div class="step-num">${s.num}</div>
        <div class="step-label">${s.label}</div>
        <div class="step-badge">${BADGES.pending}</div>`;
      list.appendChild(el);
    });
  }

  function updateStep(id, status) {
    const el = document.getElementById('step-' + id);
    if (!el) return;
    el.className = 'step-item step-' + status + (status === 'running' ? ' active' : '');
    el.querySelector('.step-badge').textContent = BADGES[status] || '?';
  }

  // ── Couleurs logs ────────────────────────────────────────────────────
  const LOG_COLORS = { ok: '#6ab023', warn: '#f59e0b', error: '#ef4444', info: '#a0a0b0', pause: '#60a5fa' };

  function appendLog(msg) {
    const box = document.getElementById('log-box');
    const line = document.createElement('div');
    line.className = 'log-line';
    const color = LOG_COLORS[msg.level] || '#a0a0b0';
    line.innerHTML = `<span class="log-ts">[${msg.ts}]</span> <span style="color:${color}">${escHtml(msg.text)}</span>`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── SSE ──────────────────────────────────────────────────────────────
  let currentPauseId = null;
  let evtSource = null;

  function startSSE() {
    if (evtSource) evtSource.close();
    evtSource = new EventSource('/stream');
    evtSource.onmessage = function(e) {
      const msg = JSON.parse(e.data);
      if (msg.type === 'log')      handleLog(msg);
      else if (msg.type === 'step')     handleStep(msg);
      else if (msg.type === 'pause')    handlePause(msg);
      else if (msg.type === 'progress') handleProgress(msg);
      else if (msg.type === 'done')     handleDone(msg);
    };
  }

  function handleLog(msg)      { appendLog(msg); }
  function handleStep(msg)     { updateStep(msg.id, msg.status); }
  function handleProgress(msg) {
    document.getElementById('prog-bar').value = msg.pct;
    document.getElementById('pct-label').textContent = msg.pct + '%';
  }
  function handlePause(msg) {
    currentPauseId = msg.id;
    document.getElementById('pause-message').textContent = msg.message;
    document.getElementById('pause-banner').style.display = 'flex';
    document.getElementById('btn-continue').style.display = 'block';
  }
  function handleDone(msg) {
    if (evtSource) { evtSource.close(); evtSource = null; }
    document.getElementById('btn-quit').style.display = 'block';
    if (msg.success) {
      appendLog({ ts: now(), level: 'ok', text: '✓ Pipeline terminé avec succès' });
      handleProgress({ pct: 100 });
      loadReport();
    } else {
      appendLog({ ts: now(), level: 'error', text: '✗ Pipeline terminé avec erreurs' });
    }
  }

  // ── Actions ──────────────────────────────────────────────────────────
  function doContinue() {
    if (!currentPauseId) return;
    if (!confirm('Les fichiers sont bien présents dans Input_Data ?')) return;
    fetch('/resume', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pause_id: currentPauseId })
    });
    document.getElementById('pause-banner').style.display = 'none';
    document.getElementById('btn-continue').style.display = 'none';
    currentPauseId = null;
  }

  function openFolder(path) {
    fetch('/open-folder?path=' + encodeURIComponent(path));
  }

  function quit() {
    fetch('/shutdown', { method: 'POST' });
    setTimeout(() => window.close(), 800);
  }

  function loadReport() {
    fetch('/report').then(r => r.json()).then(data => {
      if (data.ok) {
        const sec = document.getElementById('report-section');
        sec.style.display = 'block';
        sec.innerHTML = data.html;
        // Ré-exécuter les scripts Chart.js injectés
        sec.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          s.textContent = old.textContent;
          old.parentNode.replaceChild(s, old);
        });
        sec.scrollIntoView({ behavior: 'smooth' });
      }
    }).catch(() => {});
  }

  // ── Formulaire login ─────────────────────────────────────────────────
  function now() {
    return new Date().toTimeString().slice(0,8);
  }

  function launchPipeline() {
    const user = document.getElementById('pg-user');
    const pass = document.getElementById('pg-pass');
    let ok = true;
    if (!user.value.trim()) { user.classList.add('invalid'); ok = false; } else { user.classList.remove('invalid'); }
    if (!pass.value.trim()) { pass.classList.add('invalid'); ok = false; } else { pass.classList.remove('invalid'); }
    if (!ok) return;

    // Afficher le flux du jour
    const today = new Date();
    const dd = String(today.getDate()).padStart(2,'0');
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const yy = today.getFullYear();
    document.getElementById('flux-label').textContent = 'Flux : ' + dd + mm + yy;

    // Basculer vers vue pipeline
    document.getElementById('view-login').style.display = 'none';
    const vp = document.getElementById('view-pipeline');
    vp.style.display = 'flex';
    buildStepsList();
    startSSE();

    fetch('/start', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pg_user: user.value.trim(), pg_password: pass.value })
    }).then(r => r.json()).then(d => {
      if (d.error) appendLog({ ts: now(), level: 'error', text: d.error });
    });
  }

  document.getElementById('btn-launch').addEventListener('click', launchPipeline);
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('view-login').style.display !== 'none') {
      launchPipeline();
    }
  });

  document.getElementById('toggle-eye').addEventListener('click', function() {
    const inp = document.getElementById('pg-pass');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.textContent = inp.type === 'password' ? '👁' : '🙈';
  });
</script>
