{% extends "base.html" %}
{% set active_module = "" %}
{% block title %}Erreur {{ code }}{% endblock %}
{% block content %}
  <div class="card" style="max-width:520px;margin:40px auto;text-align:center">
    <div style="font-size:48px;font-weight:800;color:var(--danger)">{{ code }}</div>
    <p style="color:var(--text-muted);margin:12px 0 20px">{{ message }}</p>
    <a class="btn btn-primary" href="{{ url_for('root') }}">← Retour à l'accueil</a>
  </div>
{% endblock %}
